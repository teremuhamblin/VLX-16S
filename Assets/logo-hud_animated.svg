<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <!-- Fond -->
  <rect width="500" height="200" fill="#050608"/>

  <!-- Grille HUD -->
  <g stroke="#1A1F1A" stroke-width="0.5">
    <line x1="0" y1="40" x2="500" y2="40"/>
    <line x1="0" y1="80" x2="500" y2="80"/>
    <line x1="0" y1="120" x2="500" y2="120"/>
    <line x1="0" y1="160" x2="500" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
  </g>

  <!-- Cadre principal -->
  <rect x="30" y="40" width="440" height="120" fill="none" stroke="#4B5320" stroke-width="2"/>

  <!-- Chevrons latéraux -->
  <path d="M30 100 L50 90 L50 110 Z" fill="#4B5320"/>
  <path d="M470 100 L450 90 L450 110 Z" fill="#4B5320"/>

  <!-- Bande supérieure -->
  <path d="M40 55 H460 L440 80 H60 Z" fill="#4B5320" opacity="0.9">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.8s" fill="freeze"/>
  </path>

  <!-- Texte VLX-16S -->
  <text x="50%" y="105" text-anchor="middle"
        font-family="Orbitron" font-size="50"
        fill="#C2B280" stroke="#5A5A5A" stroke-width="2"
        dominant-baseline="middle">
    VLX-16S
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.4s" fill="freeze"/>
  </text>

  <!-- Bande inférieure -->
  <path d="M90 135 H410 L390 160 H110 Z" fill="#5A5A5A" opacity="0.9">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.8s" begin="0.6s" fill="freeze"/>
  </path>

  <!-- Point rouge clignotant -->
  <circle cx="250" cy="147" r="7" fill="#B22222">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Radar circulaire -->
  <circle cx="250" cy="100" r="60" fill="none" stroke="#4B5320" stroke-width="1"/>
  <circle cx="250" cy="100" r="30" fill="none" stroke="#4B5320" stroke-width="1" opacity="0.7"/>

  <!-- Balayage radar -->
  <path id="radar" d="M250 100 L310 100 A60 60 0 0 1 250 40 Z"
        fill="url(#radarGradient)" opacity="0.6">
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="0 250 100"
                      to="360 250 100"
                      dur="3s"
                      repeatCount="indefinite"/>
  </path>

  <!-- Dégradé radar -->
  <defs>
    <radialGradient id="radarGradient" cx="50%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#4B5320" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4B5320" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Lignes de scan horizontales -->
  <line x1="40" y1="75" x2="460" y2="75" stroke="#4B5320" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="40" y1="125" x2="460" y2="125" stroke="#4B5320" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.5s" begin="0.7s" repeatCount="indefinite"/>
  </line>
</svg>
